# 워크플로우 이름
name: Crawl University Notices

# 언제 이 코드를 실행할지 정하는 부분
on:
  schedule:
    # cron 스케줄 문법: 분 시 일 월 요일
    # 아래는 매 시간 정각에 코드를 실행하라는 의미
    - cron: '*/30 * * * *'
  # Actions 탭에서 수동으로도 실행할 수 있게 해주는 옵션
  workflow_dispatch:
    inputs:
      test_webhooks:
        description: "Send 1 test message per site (no new notice required)"
        required: false
        default: "false"

# 실제 작업 내용
jobs:
  crawl:
    # 이 코드를 어떤 환경에서 실행할지 (최신 우분투 리눅스)
    runs-on: ubuntu-latest

    permissions: 
      contents: write

    # 작업 단계들
    steps:
    # 1. 내 저장소에 있는 코드를 가상 컴퓨터로 가져오는 단계
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 파이썬을 설치하는 단계
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 필요한 라이브러리(requests, beautifulsoup4)를 설치하는 단계
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 4. 드디어 우리의 파이썬 스크립트를 실행하는 단계
    - name: Run crawler script
      run: python crawler.py
      env:
        # 사이트별 채널: Secrets 이름은 crawler.py 의 webhook_env 와 동일해야 함
        DISCORD_WEBHOOK_ECON: ${{ secrets.DISCORD_WEBHOOK_ECON }}
        DISCORD_WEBHOOK_IMAI: ${{ secrets.DISCORD_WEBHOOK_IMAI }}
        DISCORD_WEBHOOK_CBA: ${{ secrets.DISCORD_WEBHOOK_CBA }}
        # 선택: 사이트별 Secret 이 없을 때만 사용 (폴백)
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        DEBUG_SAVE_HTML: "1"
        DEBUG_HTML_DIR: "debug_html"
        MIN_NOTICE_COUNT: "3"
        REQUEST_TIMEOUT_SECONDS: "20"
        MAX_DEBUG_HTML_BYTES: "2000000"
        FAIL_ON_SITE_FAILURE: "1"
        MAX_STORED_LINKS_PER_SITE: "200"
        MAX_SEND_PER_SITE_PER_RUN: "20"
        TEST_WEBHOOKS: ${{ github.event.inputs.test_webhooks == 'true' && '1' || '0' }}

    - name: Upload debug HTML artifacts (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-html
        path: debug_html/**
        if-no-files-found: ignore

    - name: Commit and push if changed
      if: always()
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add latest_links.json
        # 파일에 변경사항이 있을 때만 커밋하고 푸시함
        git diff --staged --quiet || git commit -m "Update latest announcement links"
        git push
