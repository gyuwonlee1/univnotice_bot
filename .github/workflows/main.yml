# 워크플로우 이름
name: Crawl University Notices

# 언제 이 코드를 실행할지 정하는 부분
on:
  schedule:
    # cron 스케줄 문법: 분 시 일 월 요일
    # 아래는 매 시간 정각에 코드를 실행하라는 의미
    - cron: '0 * * * *'
  # Actions 탭에서 수동으로도 실행할 수 있게 해주는 옵션
  workflow_dispatch:

# 실제 작업 내용
jobs:
  crawl:
    # 이 코드를 어떤 환경에서 실행할지 (최신 우분투 리눅스)
    runs-on: ubuntu-latest

    # 작업 단계들
    steps:
    # 1. 내 저장소에 있는 코드를 가상 컴퓨터로 가져오는 단계
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 파이썬을 설치하는 단계
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 필요한 라이브러리(requests, beautifulsoup4)를 설치하는 단계
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 4. 드디어 우리의 파이썬 스크립트를 실행하는 단계
    - name: Run crawler script
      run: python crawler.py
      env:
        # Settings에 저장해둔 DISCORD_WEBHOOK_URL을 코드에서 사용할 수 있게 연결
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add latest_links.json
        # 파일에 변경사항이 있을 때만 커밋하고 푸시함
        git diff --staged --quiet || git commit -m "Update latest announcement links"
        git push
